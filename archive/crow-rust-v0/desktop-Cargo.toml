[package]
name = "crow-desktop"
version = "0.1.0"
description = "Crow desktop shell (Tauri 2)"
authors = ["Ferre <ferre@crow.ai>"]
edition = "2021"

[lib]
name = "crow_desktop"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

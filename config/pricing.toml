# Per-model token pricing, in USD per 1K tokens.
#
# Loaded at startup by `provider::pricing::Pricing::load`. Used by the
# TUI status bar (F.04.05) and the `/cost` slash command (F.10.08)
# to translate cumulative token counts into an approximate dollar
# cost. Rates are sourced from each provider's public pricing page
# at the time of writing; update freely without recompiling — the
# TUI re-reads this file on launch.
#
# Schema:
#   [model-id]
#   context_size = 262144
#   input_per_1k  = 0.00050   # USD per 1K input tokens
#   output_per_1k = 0.00150   # USD per 1K output tokens
#
# `[default]` is the fallback when the active model isn't listed
# here. Set conservative rates so unknown models still produce a
# ballpark cost.
#
# To see the active model's rate from inside the TUI, run `/cost`.

